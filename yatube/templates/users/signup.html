{% extends 'base.html' %}

{% block title %}Регистрация{% endblock %}

{% block content %}
  <div class="card">
    <h2>Регистрация</h2>
    <form method="post" style="margin-top:16px;">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit" class="btn">Зарегистрироваться</button>
    </form>
    <p style="margin-top:12px;">Уже есть аккаунт? <a href="{% url 'users:login' %}">Войти</a></p>
  </div>
{% endblock %}
